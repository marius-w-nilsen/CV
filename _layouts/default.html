<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%23333'>📄</text></svg>">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-content">
        <div class="header-left">
          <h1 class="title">{{ site.author.name }}</h1>
        </div>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
      </div>
    </header>

    <main class="content">
      {{ content }}
    </main>

    <footer class="footer">
      <nav class="social-links">
        {% if site.author.github %}
          <a href="https://github.com/{{ site.author.github }}" target="_blank" rel="noopener noreferrer">GitHub</a>
        {% endif %}
        {% if site.author.email %}
          <a href="mailto:{{ site.author.email }}">Email</a>
        {% endif %}
      </nav>
      <p class="built-with">Built with Jekyll & hosted on GitHub Pages</p>
    </footer>
  </div>

  <script src="{{ '/assets/js/theme.js' | relative_url }}"></script>
</body>
</html>
